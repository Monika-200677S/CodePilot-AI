spring.application.name=codepilot-ai

# ===================== MYSQL DATABASE =====================
spring.datasource.url=jdbc:mysql://localhost:3306/codepilot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== JWT =====================
# Change this in production - must be 32+ characters for HS256
jwt.secret=ChangeThisSecretKeyToSomethingLongAndRandomForProduction123456
jwt.expiration.ms=86400000

# ===================== AI MENTOR =====================
# Get a free key at https://aistudio.google.com/app/apikey
ai.provider=gemini
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# If you'd rather use OpenAI, set ai.provider=openai and fill these in:
openai.api.key=YOUR_OPENAI_API_KEY_HERE
openai.api.url=https://api.openai.com/v1/chat/completions

# ===================== FILE UPLOAD (Resume Analyzer) =====================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================== SWAGGER =====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===================== CORS =====================
app.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500
