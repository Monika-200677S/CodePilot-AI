<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · CodePilot AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="brand"><span class="dot"></span> codepilot-ai</div>

        <h1>Choose a new password</h1>
        <p class="subtitle">Enter a new password for your account.</p>

        <div class="form-error" id="errorBox"></div>

        <form id="resetForm">
            <div class="field">
                <label for="password">new password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Reset password</button>
        </form>

        <div class="auth-footer">
            <a href="login.html">Back to login</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const form = document.getElementById("resetForm");
    const errorBox = document.getElementById("errorBox");
    const submitBtn = document.getElementById("submitBtn");

    if (!token) {
        errorBox.textContent = "Missing reset token. Please use the link from the forgot-password step.";
        errorBox.classList.add("visible");
        form.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";

        try {
            await apiFetch("/auth/reset-password", {
                method: "POST",
                body: JSON.stringify({
                    token: token,
                    newPassword: document.getElementById("password").value
                })
            });
            window.location.href = "login.html";
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.add("visible");
            submitBtn.disabled = false;
            submitBtn.textContent = "Reset password";
        }
    });
</script>

</body>
</html>
