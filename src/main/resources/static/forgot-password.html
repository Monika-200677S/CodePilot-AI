<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password · CodePilot AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="brand"><span class="dot"></span> codepilot-ai</div>

        <h1>Reset your password</h1>
        <p class="subtitle">Enter your account email and we'll generate a reset link.</p>

        <div class="form-error" id="errorBox"></div>
        <div class="form-error" id="infoBox" style="background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.3); color: var(--blue);"></div>

        <form id="forgotForm">
            <div class="field">
                <label for="email">email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>
        </form>

        <div class="auth-footer">
            Remembered it? <a href="login.html">Back to login</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const form = document.getElementById("forgotForm");
    const errorBox = document.getElementById("errorBox");
    const infoBox = document.getElementById("infoBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("visible");
        infoBox.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        try {
            const data = await apiFetch("/auth/forgot-password", {
                method: "POST",
                body: JSON.stringify({ email: document.getElementById("email").value.trim() })
            });

            if (data.demoResetToken) {
                // No SMTP server is configured for this demo, so the reset
                // link is shown directly instead of being emailed.
                infoBox.innerHTML = `${data.message}<br><br><a href="reset-password.html?token=${data.demoResetToken}">Click here to reset your password →</a>`;
            } else {
                infoBox.textContent = data.message;
            }
            infoBox.classList.add("visible");
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.add("visible");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send reset link";
        }
    });
</script>

</body>
</html>
