<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register · CodePilot AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="brand"><span class="dot"></span> codepilot-ai</div>

        <h1>Create your account</h1>
        <p class="subtitle">Start practicing for coding interviews with an AI mentor.</p>

        <div class="form-error" id="errorBox"></div>

        <form id="registerForm">
            <div class="field">
                <label for="name">name</label>
                <input type="text" id="name" placeholder="Monika" required>
            </div>
            <div class="field">
                <label for="email">email</label>
                <input type="email" id="email" placeholder="monika@gmail.com" required>
            </div>
            <div class="field">
                <label for="password">password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const form = document.getElementById("registerForm");
    const errorBox = document.getElementById("errorBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating account...";

        const payload = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const data = await apiFetch("/api/auth/register", {
                method: "POST",
                body: JSON.stringify(payload)
            });
            setSession(data);
            window.location.href = "dashboard.html";
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.add("visible");
            submitBtn.disabled = false;
            submitBtn.textContent = "Register";
        }
    });
</script>

</body>
</html>
