<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in · CodePilot AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="brand"><span class="dot"></span> codepilot-ai</div>

        <h1>Welcome back</h1>
        <p class="subtitle">Log in to continue your interview prep.</p>

        <div class="form-error" id="errorBox"></div>

        <form id="loginForm">
            <div class="field">
                <label for="email">email</label>
                <input type="email" id="email" placeholder="monika@gmail.com" required>
            </div>
            <div class="field">
                <label for="password">password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";

        const payload = {
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const data = await apiFetch("/auth/login", {
                method: "POST",
                body: JSON.stringify(payload)
            });

            setSession(data);
            window.location.href = "dashboard.html";

        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.add("visible");
            submitBtn.disabled = false;
            submitBtn.textContent = "Login";
        }
    });
</script>

</body>
</html>
